<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hirely - Company Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);">

    <header id="navbar">
        <div class="logo-container">
            <img src="./Image/Logo.jpeg" alt="Hirely Logo" width="40" height="40">
            <h2 class="logo-text">Hirely</h2>
        </div>
        <div class="nav-links">
            <a href="employerdashboard.html" class="nav-item">Dashboard</a>
            <a href="support.html" class="nav-item">Support</a>
            <a href="Login.html" class="nav-item">Logout</a>
        </div>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <h3 style="font-size: 1.1em;">Recruiter Tools</h3>
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <a href="employerdashboard.html" class="nav-item">Dashboard</a>
                <a href="postjobs.html" class="nav-item">Post New Job</a>
                <a href="myapplicants.html" class="nav-item">My Applicants</a>
                <a href="companypro.html" class="nav-item" style="color: var(--primary-color); font-weight: bold;">Company Profile</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="selection-card" style="max-width: 900px; width: 95%; margin: 0 auto; text-align: left; padding: 40px;">
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                    <div style="width: 80px; height: 80px; background: #eee; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border-color);">
                        <img src="./Image/Logo.jpeg" alt="Company Logo" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div>
                        <h2 style="margin: 0;">Company Profile</h2>
                        <p style="color: var(--text-muted); margin: 5px 0 0 0;">Update your company details and branding.</p>
                    </div>
                </div>

                <form class="login-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label style="font-weight: 600; display: block; margin-bottom: 8px;">Company Name</label>
                            <input type="text" value="Hirely Tech" class="input-field" required>
                        </div>
                        <div>
                            <label style="font-weight: 600; display: block; margin-bottom: 8px;">Website URL</label>
                            <input type="url" placeholder="https://company.com" class="input-field" required>
                        </div>
                    </div>

                    <div style="margin-top: 20px;">
                        <label style="font-weight: 600; display: block; margin-bottom: 8px;">Industry</label>
                        <select class="input-field" style="background: white;">
                            <option>Technology</option>
                            <option>Healthcare</option>
                            <option>Finance</option>
                            <option>Education</option>
                        </select>
                    </div>

                    <div style="margin-top: 20px;">
                        <label style="font-weight: 600; display: block; margin-bottom: 8px;">Company Bio</label>
                        <textarea class="input-field" style="height: 120px; font-family: inherit;" placeholder="Describe what your company does..."></textarea>
                    </div>

                    <div style="margin-top: 20px;">
                        <label style="font-weight: 600; display: block; margin-bottom: 8px;">Office Address</label>
                        <input type="text" placeholder="123 Business St, Cairo, Egypt" class="input-field">
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="submit" class="apply-btn" style="position: static; flex: 2;">Save Profile</button>
                        <button type="button" class="apply-btn" style="position: static; flex: 1; background-color: #e0e0e0; color: #333;">Preview</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <footer id="footer">
        <div class="footer-container">
            <p>© 2026 Hirely Recruiter Portal</p>
        </div>
    </footer>
</body>
</html>
