<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hirely - My Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);">

    <header id="navbar">
        <div class="logo-container">
            <img src="./Image/Logo.jpeg" alt="Hirely Logo" width="40" height="40">
            <h2 class="logo-text">Hirely</h2>
        </div>
        <nav class="nav-links">
            <a href="home-page.html" class="nav-item">Home</a>
            <a href="jobs.html" class="nav-item">Find Jobs</a>
            <a href="messages.html" class="nav-item">Messages</a>
            <a href="my-profile.html" class="nav-item" style="color: var(--primary-color); font-weight: bold;">My Profile</a>
            <a href="Login.html" class="nav-item">Logout</a>
        </nav>
    </header>

    <main class="messages-container" style="max-width: 900px; margin-top: 40px;">
        <div style="background: white; padding: 40px; border-radius: 15px; border: 1px solid var(--border-color);">
            
            <div style="display: flex; align-items: center; gap: 25px; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 30px;">
                <div style="width: 100px; height: 100px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5em; border: 3px solid var(--primary-color);">
                    👤
                </div>
                <div>
                    <h1 style="margin: 30; font-size: 1.8em;">Ahmed</h1>
                    <p style="color: var(--text-muted); margin: 5px 0;">First-year Student | Aspiring Web Developer</p>
                    <span class="status-pill status-active">Available for Work</span>
                </div>
            </div>

            <form action="#">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Full Name</label>
                        <input type="text" class="input-field" value="Ahmed" style="width: 100%; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 8px;">Email Address</label>
                        <input type="email" class="input-field" value="ahmed@gmail.com" style="width: 100%; box-sizing: border-box;">
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px;">Bio / Professional Summary</label>
                    <textarea class="input-field" style="width: 100%; height: 100px; box-sizing: border-box; font-family: inherit;">I am a dedicated first-year student focusing on web development, specifically structural design and wireframing. Looking for opportunities to grow.</textarea>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px;">Skills (Comma separated)</label>
                    <input type="text" class="input-field" value="HTML, CSS, Web Development, Site Mapping" style="width: 100%; box-sizing: border-box;">
                </div>

                <div style="background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px dashed var(--primary-color); text-align: center; margin-bottom: 30px;">
                    <p style="margin: 0 0 10px 0; font-weight: 600;">Resume / CV</p>
                    <input type="file" id="resume-upload" style="display: none;">
                    <label for="resume-upload" class="apply-btn" style="position: static; display: inline-block; cursor: pointer; padding: 10px 20px;">Upload New CV</label>
                    <p style="font-size: 0.8em; color: #666; margin-top: 10px;">Current: Mutascu_CV_2026.pdf</p>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button type="submit" class="apply-btn" style="position: static; flex: 2; padding: 15px;">Update Profile</button>
                    <button type="button" class="apply-btn" style="position: static; flex: 1; background: #e0e0e0; color: #333; padding: 15px;">Cancel</button>
                </div>
            </form>
        </div>
    </main>

    <footer id="footer">
        <div class="footer-container">
            <p>© 2026 Hirely. All rights reserved.</p>
            <nav class="footer-links">
                <a href="about-us.html">About</a>
                <a href="legal.html">Privacy Policy</a>
                <a href="legal.html">Terms</a>
            </nav>
        </div>
    </footer>

</body>
</html>
